packages:
  - "Frontend"
  - "packages/*"
  - "Backend"
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@tailwindcss/oxide': true
  bcrypt: true
  esbuild: true
  prisma: true
onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - esbuild
overrides:
  '@types/react': 18.3.18
  '@types/react-dom': 18.3.7
